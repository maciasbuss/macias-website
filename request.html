<section class="page-header">
<h1>Request a Free Quote</h1>
<p>Fill out the form below and we will contact you shortly.</p>
</section>

<section class="form-section">
<form class="quote-form" action="https://formspree.io/f/xbdavkea" method="POST">

<label>Name</label>
<input type="text" name="name" placeholder="Your name" required />

<label>Phone</label>
<input type="text" name="phone" placeholder="918-570-3422" required />

<label>Email</label>
<input type="email" name="email" placeholder="you@example.com" required />

<label>Service Needed</label>
<select name="service">
<option>Landscaping</option>
<option>Hardscaping</option>
<option>Remodeling</option>
<option>Kitchen or Bathroom</option>
<option>Fencing</option>
<option>Painting</option>
<option>Plumbing</option>
</select>

<label>Project Details</label>
<textarea name="details" placeholder="Describe your project" required></textarea>

<button type="submit" class="btn">Submit Request</button>
</form>
</section>

<footer>
